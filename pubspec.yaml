name: fluense
description: Fluense MR Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP & API
  http: ^1.2.1
  # Secure storage for tokens
  flutter_secure_storage: ^9.0.0
  # State management
  provider: ^6.1.2
  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  # Maps
  google_maps_flutter: ^2.6.1
  # Image picker
  image_picker: ^1.1.2
  # URL launcher (for phone calls, maps)
  url_launcher: ^6.3.0
  # Local storage
  shared_preferences: ^2.2.3
  # Intl / date formatting
  intl: ^0.19.0
  # Icons
  cupertino_icons: ^1.0.6
  # Charts
  fl_chart: ^0.68.0
  # Cached network image
  cached_network_image: ^3.3.1
  # Environment variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
